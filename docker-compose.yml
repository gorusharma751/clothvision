version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clothvision
      POSTGRES_USER: cvuser
      POSTGRES_PASSWORD: cvpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://cvuser:cvpassword@postgres:5432/clothvision
      JWT_SECRET: clothvision_super_secret_2024
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
